body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F0F2F5;color:#1a1a1a;min-height:100vh}

/* ── Top bar ── */

.sync-dot.error{background:#FCA5A5}

/* ── Layout ── */

.prop-status-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}

.psb-label{font-size:10px;color:#aaa;margin-top:2px}
.psb-bar{height:3px;border-radius:999px;background:#EEE;margin-top:8px}

// ── CLOUD STORAGE ─────────────────────────────────────────────────────────
const STORAGE_KEY_PREFIX = 'ps_permit_';

async function cloudGet(key) {
  try {
    const result = await window.storage.get(STORAGE_KEY_PREFIX + key, true);
    return result ? JSON.parse(result.value) : null;
  } catch(e) { return null; }
}
async function cloudSet(key, value) {
  try {
    await window.storage.set(STORAGE_KEY_PREFIX + key, JSON.stringify(value), true);
    return true;
  } catch(e) { return false; }
}

// ── LOCAL CACHE ───────────────────────────────────────────────────────────
let cache = {};

async function getCommentData(prop, discCode, ref) {
  const k = `${prop}_${discCode}_${ref}`;
  if (cache[k]) return cache[k];
  const d = await cloudGet(k);
  const def = { assignee:'', status:'Pending', notes:'', history:[] };
  cache[k] = d || def;
  return cache[k];
}

async function saveCommentData(prop, discCode, ref, data) {
  const k = `${prop}_${discCode}_${ref}`;
  cache[k] = data;
  return await cloudSet(k, data);
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────
const CITY_STATUS_CLASS = {
  'Unresolved':'b-r','Resolved':'b-g','Info Only':'b-gray','Information':'b-gray'
};
const CITY_STATUS_BG = {
  'CORRECTIONS':'b-r','PENDING ACTION':'b-a','PENDING REVIEW':'b-a','APPROVED':'b-g','PRE-SUBMISSION':'b-gray'
};
const INT_STATUS_OPTS = ['Pending','In Progress','With Architect','With Engineer','With Owner','Submitted','Resolved'];
const INT_STATUS_CLASS = {
  'Pending':'b-gray','In Progress':'b-blue','With Architect':'b-a',
  'With Engineer':'b-a','With Owner':'b-a','Submitted':'b-purple','Resolved':'b-g'
};

function fmtDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' ' +
         dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderPropBar(activeProp) {
  const bar = document.getElementById('propBar');
  bar.innerHTML = PROPS.map(p => {
    const pctColor = p.pct === 0 ? 'r' : p.pct < 50 ? 'a' : 'g';
    const pctBarColor = p.pct === 0 ? '#A32D2D' : p.pct < 50 ? '#854F0B' : '#3B6D11';
    const isActive = p.key === activeProp;
    return `<div class="psb-card${isActive?' active':''}" onclick="switchProp('${p.key}')">
      <div class="psb-cycle"><span class="badge ${p.cycleClass}" style="font-size:9px">${p.cycle}</span></div>
      <div class="psb-addr">${p.addr}</div>
      <div class="psb-permit">${p.permit}</div>
      ${p.total > 0 ? `
        <div class="psb-open ${pctColor}">${p.open}</div>
        <div class="psb-label">open comments</div>
        <div class="psb-bar" style="margin-top:6px"><div class="psb-bar-fill" style="width:${p.pct}%;background:${pctBarColor}"></div></div>
      ` : `<div class="psb-open" style="color:#bbb;font-size:14px;font-weight:500;margin-top:4px">No permit yet</div>`}
    </div>`;
  }).join('');
}

async function renderPanel(propKey) {
  const panelEl = document.getElementById('panel-' + propKey);
  const prop = PROPS.find(p => p.key === propKey);
  const discs = DISCIPLINES[propKey] || [];

  // Header
  let html = `

    </div>
    <div class="general-section" id="gen_${propKey}">
      <div class="general-header" onclick="toggleGeneral('${propKey}')">

          <span class="general-chevron" id="genchev_${propKey}">▶</span>

      </div>

        <div class="general-tabs">
          <button class="gtab active" onclick="switchGTab('${propKey}','notes',this)">Notes</button>
          <button class="gtab" onclick="switchGTab('${propKey}','tasks',this)">Tasks</button>
          <button class="gtab" onclick="switchGTab('${propKey}','dates',this)">Key dates</button>
        </div>

        <!-- Notes -->
        <div class="gtab-panel active" id="gtab_${propKey}_notes">
          <textarea class="notes-area" id="gen_notes_${propKey}" placeholder="General notes for this property — next steps, context, decisions, open questions..."></textarea>
          <div class="notes-save-row">
            <span class="notes-last-saved" id="gen_notes_ts_${propKey}">Not saved yet</span>
            <div>
              <span class="gsave-indicator" id="gen_notes_ind_${propKey}">✓ Saved</span>
              <button class="notes-save-btn" onclick="saveGenNotes('${propKey}')">Save notes</button>
            </div>
          </div>
        </div>

        <!-- Tasks -->
        <div class="gtab-panel" id="gtab_${propKey}_tasks">
          <div class="task-list" id="gen_tasklist_${propKey}">
            <div class="tasks-empty">No tasks yet — add one below.</div>
          </div>
          <div class="add-task-row">
            <input class="add-task-input" id="new_task_text_${propKey}" placeholder="Task description..." onkeydown="if(event.key==='Enter') addTask('${propKey}')"/>
            <input class="add-task-assignee" id="new_task_ass_${propKey}" placeholder="Assigned to"/>
            <input class="add-task-due" id="new_task_due_${propKey}" type="date" title="Due date"/>
            <button class="add-task-btn" onclick="addTask('${propKey}')">+ Add task</button>
          </div>
        </div>

        <!-- Key dates -->
        <div class="gtab-panel" id="gtab_${propKey}_dates">
          <div class="dates-list" id="gen_datelist_${propKey}">
            <div class="dates-empty">No dates added yet.</div>
          </div>
          <div class="add-date-row">
            <input class="add-date-label" id="new_date_label_${propKey}" placeholder="e.g. Resubmittal deadline, BBL meeting..." onkeydown="if(event.key==='Enter') addDate('${propKey}')"/>
            <input class="add-date-input" id="new_date_val_${propKey}" type="date"/>
            <button class="add-date-btn" onclick="addDate('${propKey}')">+ Add date</button>
          </div>
        </div>
      </div>
    </div>

    <div class="disc-block">
      <div class="disc-header-row">
        <span>Discipline · Reviewer</span>
        <span style="text-align:center">City status</span>
        <span style="text-align:center">Our status</span>
        <span class="dh-c">Total</span>
        <span class="dh-c">Open</span>
        <span class="dh-c">Info</span>
        <span></span>
      </div>`;

  for (let di = 0; di < discs.length; di++) {
    const d = discs[di];
    const cityClass = CITY_STATUS_BG[d.cityStatus] || 'b-gray';

    // Compute our status summary
    let ourLabel = '—', ourClass = 'b-gray';
    if (d.comments.length > 0) {
      let counts = {};
      for (const c of d.comments) {
        const data = await getCommentData(propKey, d.code, c.ref);
        counts[data.status] = (counts[data.status] || 0) + 1;
      }
      const res = counts['Resolved'] || 0;
      const sub = counts['Submitted'] || 0;
      const inp = counts['In Progress'] || 0;
      const withT = (counts['With Architect']||0)+(counts['With Engineer']||0)+(counts['With Owner']||0);
      if (res === d.comments.length) { ourLabel = 'All resolved'; ourClass = 'b-g'; }
      else if (sub > 0) { ourLabel = `${sub} submitted`; ourClass = 'b-purple'; }
      else if (withT > 0) { ourLabel = `${withT} assigned`; ourClass = 'b-a'; }
      else if (inp > 0) { ourLabel = `${inp} in progress`; ourClass = 'b-blue'; }
      else { ourLabel = 'Not started'; ourClass = 'b-gray'; }
    }

    html += `<div class="disc-row" id="discrow_${propKey}_${di}" onclick="toggleDisc('${propKey}',${di})">
      <div><div class="dname">(${d.code}) ${d.name}</div><div class="drev">${d.reviewer}</div></div>
      <div style="text-align:center"><span class="badge ${cityClass}">${d.cityStatus}</span></div>
      <div style="text-align:center"><span class="badge ${ourClass}" id="our_${propKey}_${di}">${ourLabel}</span></div>
      <div class="dc">${d.total || '—'}</div>
      <div class="dc ${d.cityStatus==='APPROVED'?'ok':'hot'}">${d.cityStatus==='APPROVED'?'✓':(d.open||'—')}</div>
      <div class="dc">${d.info||'—'}</div>
      <div class="chevron" id="chev_${propKey}_${di}">▶</div>
    </div>
    <div class="drawer" id="drawer_${propKey}_${di}">
      <div class="drawer-inner">
        <div class="drawer-meta">iBuild comments — ${d.name} (${d.comments.length} comments) · click a comment to update internal tracking</div>
        ${d.comments.length === 0
          ? `<div style="font-size:12px;color:#bbb;font-style:italic">No open comments — discipline ${d.cityStatus.toLowerCase()}.</div>`
          : d.comments.map(c => `
          <div class="cc" id="cc_${propKey}_${d.code}_${c.ref}">
            <div class="cc-top" onclick="toggleComment('${propKey}','${d.code}',${c.ref},${di})">
              <span class="cc-ref">REF #${c.ref}</span>
              <span class="cc-body">${c.text}</span>
              <div class="cc-badges">
                <span class="badge ${CITY_STATUS_CLASS[c.cs]||'b-gray'}" style="font-size:9.5px">${c.cs}</span>
                <span class="badge b-gray" id="ibadge_${propKey}_${d.code}_${c.ref}" style="font-size:9.5px">Pending</span>
              </div>
            </div>
            <div class="cc-internal" id="int_${propKey}_${d.code}_${c.ref}">
              <div class="int-grid">
                <div>
                  <div class="fl">Assigned to</div>
                  <input class="fi" id="ass_${propKey}_${d.code}_${c.ref}" placeholder="Name or team" />
                </div>
                <div>
                  <div class="fl">Our status</div>
                  <select class="fs" id="sta_${propKey}_${d.code}_${c.ref}">
                    ${INT_STATUS_OPTS.map(s=>`<option value="${s}">${s}</option>`).join('')}
                  </select>
                </div>
                <div>
                  <div class="fl">Notes</div>
                  <input class="fi" id="not_${propKey}_${d.code}_${c.ref}" placeholder="Next step, deadline, context..." />
                </div>
              </div>
              <button class="save-btn" onclick="saveComment('${propKey}','${d.code}',${c.ref},${di})">Save</button>
              <span class="saving-spinner" id="spin_${propKey}_${d.code}_${c.ref}">Saving...</span>
              <div class="history" id="hist_${propKey}_${d.code}_${c.ref}">
                <div class="history-title">History</div>
                <div class="history-empty">No history yet.</div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  html += `</div>`;

  // Alerts
  if (prop.alerts.length > 0) {
    html += `<div class="alerts-block" style="border-radius:0 0 12px 12px">`;
    prop.alerts.forEach(a => {
      html += `<div class="alert-item">
        <span class="apill ap-${a.level}">${a.level==='r'?'URGENT':'NOTE'}</span>
        <div class="atext"><strong>${a.title}</strong><span>${a.text}</span></div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div style="border-radius:0 0 12px 12px;border:0.5px solid #E0E0D8;border-top:none;height:6px;background:#fff"></div>`;
  }

  panelEl.innerHTML = html;

  // Now populate saved data into inputs and badges
  for (const d of discs) {
    for (const c of d.comments) {
      const data = await getCommentData(propKey, d.code, c.ref);
      populateComment(propKey, d.code, c.ref, data);
    }
  }
}

function populateComment(prop, code, ref, data) {
  const assEl = document.getElementById(`ass_${prop}_${code}_${ref}`);
  const staEl = document.getElementById(`sta_${prop}_${code}_${ref}`);
  const notEl = document.getElementById(`not_${prop}_${code}_${ref}`);
  const ibEl  = document.getElementById(`ibadge_${prop}_${code}_${ref}`);
  if (assEl) assEl.value = data.assignee || '';
  if (staEl) staEl.value = data.status || 'Pending';
  if (notEl) notEl.value = data.notes || '';
  if (ibEl)  { ibEl.className = 'badge ' + (INT_STATUS_CLASS[data.status]||'b-gray'); ibEl.textContent = data.status||'Pending'; }
  renderHistory(prop, code, ref, data.history || []);
}

function renderHistory(prop, code, ref, history) {
  const el = document.getElementById(`hist_${prop}_${code}_${ref}`);
  if (!el) return;
  if (!history || history.length === 0) {
    el.innerHTML = `<div class="history-title">History</div><div class="history-empty">No history yet.</div>`;
    return;
  }
  let h = `<div class="history-title">History</div>`;
  history.slice().reverse().forEach(entry => {
    h += `<div class="history-entry">
      <span class="history-ts">${fmtDate(entry.ts)}</span>
      <span><strong>${entry.assignee||'—'}</strong> · <span class="badge ${INT_STATUS_CLASS[entry.status]||'b-gray'}" style="font-size:9px">${entry.status}</span>${entry.notes ? ' · ' + entry.notes : ''}</span>
    </div>`;
  });
  el.innerHTML = h;
}

function toggleDisc(prop, di) {
  const drawer = document.getElementById(`drawer_${prop}_${di}`);
  const chev   = document.getElementById(`chev_${prop}_${di}`);
  const row    = document.getElementById(`discrow_${prop}_${di}`);
  const open   = drawer.classList.contains('open');
  drawer.classList.toggle('open', !open);
  chev.classList.toggle('open', !open);
  row.classList.toggle('is-open', !open);
}

function toggleComment(prop, code, ref, di) {
  const el = document.getElementById(`int_${prop}_${code}_${ref}`);
  el.classList.toggle('open');
}

async function saveComment(prop, code, ref, di) {
  const ass  = document.getElementById(`ass_${prop}_${code}_${ref}`).value.trim();
  const sta  = document.getElementById(`sta_${prop}_${code}_${ref}`).value;
  const not  = document.getElementById(`not_${prop}_${code}_${ref}`).value.trim();
  const spin = document.getElementById(`spin_${prop}_${code}_${ref}`);

  spin.style.display = 'inline';
  spin.textContent = 'Saving...';

  const existing = await getCommentData(prop, code, ref);
  const history  = existing.history || [];
  history.push({ ts: new Date().toISOString(), assignee: ass, status: sta, notes: not });

  const newData = { assignee: ass, status: sta, notes: not, history };
  const ok = await saveCommentData(prop, code, ref, newData);

  spin.style.display = 'inline';
  spin.textContent = ok ? '✓ Saved' : '⚠ Error saving';
  spin.style.color  = ok ? '#3B6D11' : '#A32D2D';
  setTimeout(() => { spin.style.display = 'none'; }, 2000);

  // Update badge
  const ibEl = document.getElementById(`ibadge_${prop}_${code}_${ref}`);
  if (ibEl) { ibEl.className = 'badge ' + (INT_STATUS_CLASS[sta]||'b-gray'); ibEl.textContent = sta; }

  // Update history
  renderHistory(prop, code, ref, history);

  // Update disc-level badge
  await refreshDiscBadge(prop, di);

  // Sync indicator
  setSynced();
}

async function refreshDiscBadge(prop, di) {
  const disc = DISCIPLINES[prop][di];
  let counts = {};
  for (const c of disc.comments) {
    const d = await getCommentData(prop, disc.code, c.ref);
    counts[d.status] = (counts[d.status]||0)+1;
  }
  const el = document.getElementById(`our_${prop}_${di}`);
  if (!el) return;
  let label='Not started', cls='b-gray';
  const n = disc.comments.length;
  if (n > 0) {
    const res=counts['Resolved']||0, sub=counts['Submitted']||0, inp=counts['In Progress']||0;
    const withT=(counts['With Architect']||0)+(counts['With Engineer']||0)+(counts['With Owner']||0);
    if (res===n){label='All resolved';cls='b-g';}
    else if(sub>0){label=`${sub} submitted`;cls='b-purple';}
    else if(withT>0){label=`${withT} assigned`;cls='b-a';}
    else if(inp>0){label=`${inp} in progress`;cls='b-blue';}
  } else { label='—'; }
  el.className='badge '+cls; el.textContent=label;
}

// ── GENERAL SECTION ───────────────────────────────────────────────────────
function toggleGeneral(prop) {
  const body = document.getElementById('genbody_' + prop);
  const chev = document.getElementById('genchev_' + prop);
  const meta = document.getElementById('gen_meta_' + prop);
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  chev.classList.toggle('open', !open);
  if (!open) { meta.textContent = ''; loadGeneral(prop); }
  else { updateGenMeta(prop); }
}

function switchGTab(prop, tab, btn) {
  ['notes','tasks','dates'].forEach(t => {
    document.getElementById(`gtab_${prop}_${t}`)?.classList.remove('active');
  });
  document.querySelectorAll(`#genbody_${prop} .gtab`).forEach(b => b.classList.remove('active'));
  document.getElementById(`gtab_${prop}_${tab}`)?.classList.add('active');
  btn.classList.add('active');
}

async function loadGeneral(prop) {
  const data = await cloudGet(`gen_${prop}`) || { notes:'', notesTs:null, tasks:[], dates:[] };
  // Notes
  const notesEl = document.getElementById(`gen_notes_${prop}`);
  if (notesEl) notesEl.value = data.notes || '';
  const tsEl = document.getElementById(`gen_notes_ts_${prop}`);
  if (tsEl) tsEl.textContent = data.notesTs ? 'Last saved: ' + fmtDate(data.notesTs) : 'Not saved yet';
  // Tasks
  renderTasks(prop, data.tasks || []);
  // Dates
  renderDates(prop, data.dates || []);
  updateGenMeta(prop);
}

async function getGenData(prop) {
  return await cloudGet(`gen_${prop}`) || { notes:'', notesTs:null, tasks:[], dates:[] };
}
async function setGenData(prop, data) {
  return await cloudSet(`gen_${prop}`, data);
}

async function saveGenNotes(prop) {
  setSyncing();
  const data = await getGenData(prop);
  data.notes = document.getElementById(`gen_notes_${prop}`).value;
  data.notesTs = new Date().toISOString();
  await setGenData(prop, data);
  const tsEl = document.getElementById(`gen_notes_ts_${prop}`);
  if (tsEl) tsEl.textContent = 'Last saved: ' + fmtDate(data.notesTs);
  const ind = document.getElementById(`gen_notes_ind_${prop}`);
  if (ind) { ind.style.display='inline'; setTimeout(()=>ind.style.display='none', 2000); }
  setSynced();
  updateGenMeta(prop);
}

async function addTask(prop) {
  const textEl = document.getElementById(`new_task_text_${prop}`);
  const assEl  = document.getElementById(`new_task_ass_${prop}`);
  const dueEl  = document.getElementById(`new_task_due_${prop}`);
  const text = textEl.value.trim();
  if (!text) return;
  setSyncing();
  const data = await getGenData(prop);
  data.tasks = data.tasks || [];
  data.tasks.push({ id: Date.now(), text, assignee: assEl.value.trim(), due: dueEl.value, done: false, createdAt: new Date().toISOString() });
  await setGenData(prop, data);
  textEl.value = ''; assEl.value = ''; dueEl.value = '';
  renderTasks(prop, data.tasks);
  setSynced();
  updateGenMeta(prop);
}

async function toggleTask(prop, id) {
  const data = await getGenData(prop);
  const task = data.tasks.find(t => t.id === id);
  if (task) task.done = !task.done;
  await setGenData(prop, data);
  renderTasks(prop, data.tasks);
  updateGenMeta(prop);
}

async function deleteTask(prop, id) {
  const data = await getGenData(prop);
  data.tasks = (data.tasks || []).filter(t => t.id !== id);
  await setGenData(prop, data);
  renderTasks(prop, data.tasks);
  updateGenMeta(prop);
}

function renderTasks(prop, tasks) {
  const el = document.getElementById(`gen_tasklist_${prop}`);
  if (!el) return;
  if (!tasks || tasks.length === 0) {
    el.innerHTML = '<div class="tasks-empty">No tasks yet — add one below.</div>';
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  el.innerHTML = tasks.map(t => {
    let dueHtml = '';
    if (t.due) {
      const d = new Date(t.due + 'T00:00:00');
      const diff = Math.ceil((d - today) / 86400000);
      const cls = t.done ? 'ok' : diff < 0 ? 'overdue' : diff <= 7 ? 'soon' : 'upcoming';
      const label = t.done ? 'Done' : diff < 0 ? `${Math.abs(diff)}d overdue` : diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      dueHtml = `<span class="task-due ${cls}">${label}</span>`;
    }
    return `<div class="task-item">
      <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleTask('${prop}',${t.id})"/>
      <div class="task-content">
        <span class="task-text${t.done?' done':''}">${t.text}</span>
        <div class="task-meta">
          ${t.assignee ? `<span class="task-assignee">→ ${t.assignee}</span>` : ''}
          ${dueHtml}
        </div>
      </div>
      <button class="task-del" onclick="deleteTask('${prop}',${t.id})" title="Delete">×</button>
    </div>`;
  }).join('');
}

async function addDate(prop) {
  const labelEl = document.getElementById(`new_date_label_${prop}`);
  const valEl   = document.getElementById(`new_date_val_${prop}`);
  const label = labelEl.value.trim();
  const val   = valEl.value;
  if (!label || !val) return;
  setSyncing();
  const data = await getGenData(prop);
  data.dates = data.dates || [];
  data.dates.push({ id: Date.now(), label, val });
  data.dates.sort((a,b) => a.val.localeCompare(b.val));
  await setGenData(prop, data);
  labelEl.value = ''; valEl.value = '';
  renderDates(prop, data.dates);
  setSynced();
  updateGenMeta(prop);
}

async function deleteDate(prop, id) {
  const data = await getGenData(prop);
  data.dates = (data.dates || []).filter(d => d.id !== id);
  await setGenData(prop, data);
  renderDates(prop, data.dates);
  updateGenMeta(prop);
}

function renderDates(prop, dates) {
  const el = document.getElementById(`gen_datelist_${prop}`);
  if (!el) return;
  if (!dates || dates.length === 0) {
    el.innerHTML = '<div class="dates-empty">No dates added yet.</div>';
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  el.innerHTML = dates.map(d => {
    const dt = new Date(d.val + 'T00:00:00');
    const diff = Math.ceil((dt - today) / 86400000);
    const cls  = diff < 0 ? 'past' : diff <= 7 ? 'soon' : 'upcoming';
    const badge = diff < 0 ? `${Math.abs(diff)}d ago` : diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return `<div class="date-item">
      <span class="date-badge ${cls}">${badge}</span>
      <div class="date-content">
        <div class="date-label">${d.label}</div>
        <div class="date-val">${dt.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})}</div>
      </div>
      <button class="date-del" onclick="deleteDate('${prop}',${d.id})" title="Delete">×</button>
    </div>`;
  }).join('');
}

async function updateGenMeta(prop) {
  const meta = document.getElementById(`gen_meta_${prop}`);
  if (!meta) return;
  const body = document.getElementById(`genbody_${prop}`);
  if (body.classList.contains('open')) { meta.textContent = ''; return; }
  try {
    const data = await getGenData(prop);
    const parts = [];
    const open = (data.tasks||[]).filter(t=>!t.done).length;
    const dates = (data.dates||[]).length;
    const hasNotes = (data.notes||'').trim().length > 0;
    if (open) parts.push(`${open} task${open>1?'s':''} open`);
    if (dates) parts.push(`${dates} date${dates>1?'s':''}`);
    if (hasNotes) parts.push('notes');
    meta.textContent = parts.length ? parts.join(' · ') : 'click to expand';
  } catch(e) { meta.textContent = 'click to expand'; }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
let activeProp = '156';
let rendered = {};

async function switchProp(key) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  activeProp = key;
  renderPropBar(key);
  const panelEl = document.getElementById('panel-' + key);
  panelEl.classList.add('active');
  if (!rendered[key] && DISCIPLINES[key]) {
    setSyncing();
    await renderPanel(key);
    rendered[key] = true;
    setSynced();
  }
}

  document.getElementById('syncDot').className = 'sync-dot loading';

}

table.pd-disc td.c{text-align:center;color:#888}
table.pd-disc td.hot{text-align:center;color:#A32D2D;font-weight:600}
table.pd-disc td.ok{text-align:center;color:#3B6D11}
.pd-badge{display:inline-block;padding:1px 6px;border-radius:999px;font-size:9px;font-weight:600}
.pd-b-r{background:#FCEBEB;color:#A32D2D}
.pd-b-a{background:#FAEEDA;color:#854F0B}
.pd-b-g{background:#EAF3DE;color:#3B6D11}
.pd-b-gray{background:#F1EFE8;color:#5F5E5A}
.pd-b-blue{background:#E6F1FB;color:#0C447C}
.pd-b-purple{background:#EEEDFE;color:#3C3489}
.pd-comments-section{margin-top:0;break-inside:avoid}
.pd-disc-group{margin-bottom:12px;break-inside:avoid}
.pd-disc-group-title{font-size:10px;font-weight:700;color:#1B3A6B;background:#EEF3FA;
  padding:4px 8px;border-radius:4px 4px 0 0;border:0.5px solid #D8E4F5;text-transform:uppercase;letter-spacing:.04em}
.pd-comment-row{display:grid;grid-template-columns:48px 1fr 90px 100px 110px;gap:6px;
  padding:5px 8px;border:0.5px solid #E8E8E4;border-top:none;align-items:start;background:#fff}
.pd-comment-row:nth-child(even){background:#FAFAFA}
.pd-comment-ref{font-size:9px;font-weight:700;color:#1B3A6B;background:#E6F1FB;
  padding:1px 5px;border-radius:999px;white-space:nowrap;margin-top:1px}
.pd-comment-text{font-size:10px;color:#333;line-height:1.4}
.pd-comment-head{display:grid;grid-template-columns:48px 1fr 90px 100px 110px;gap:6px;
  padding:4px 8px;border:0.5px solid #D8E4F5;border-top:none;background:#F5F7FA}
.pd-comment-head span{font-size:9px;font-weight:600;color:#6B7A99;text-transform:uppercase;letter-spacing:.04em}
.pd-alert{display:flex;gap:8px;align-items:flex-start;padding:6px 10px;
  border-radius:5px;margin-bottom:5px;font-size:10px}
.pd-alert.r{background:#FCEBEB;border:0.5px solid #F8D7DA}
.pd-alert.a{background:#FAEEDA;border:0.5px solid #F5D9B0}
.pd-alert strong{color:#1a1a1a;font-weight:600}
.pd-alert-pill{flex-shrink:0;padding:1px 6px;border-radius:999px;font-size:8.5px;font-weight:700;margin-top:1px}
.pd-alert-pill.r{background:#A32D2D;color:#fff}
.pd-alert-pill.a{background:#854F0B;color:#fff}
.pd-alerts-title{font-size:10px;font-weight:600;color:#1B3A6B;text-transform:uppercase;letter-spacing:.04em;margin:10px 0 6px}
.pd-hist-entry{font-size:9.5px;color:#555;margin-bottom:3px}
.pd-hist-ts{color:#AAB0C0;font-size:9px}
.pd-page-break{break-before:page}
.pd-footer{margin-top:24px;padding-top:8px;border-top:0.5px solid #E0E0D8;
  font-size:9.5px;color:#bbb;display:flex;justify-content:space-between}
</style>

<!-- Floating PDF button -->
<button id="pdfBtn" onclick="document.getElementById('pdfModal').classList.add('open')">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  Export PDF
</button>

<!-- PDF config modal -->
<div id="pdfModal">
  <div class="pdf-dialog">
    <h3>Export Status Report</h3>
    <p>Select which properties and level of detail to include in the PDF report.</p>

    <div class="pdf-label">Properties to include</div>
    <div class="pdf-prop-checks">
      <label class="pdf-prop-check"><input type="checkbox" id="pdfProp156" checked> 156 NE 77 St</label>
      <label class="pdf-prop-check"><input type="checkbox" id="pdfProp150" checked> 150 NE 77 St</label>
      <label class="pdf-prop-check"><input type="checkbox" id="pdfProp160" checked> 160 NE 77 St</label>
      <label class="pdf-prop-check"><input type="checkbox" id="pdfProp167"> 167 NE 76 St</label>
    </div>

    <div class="pdf-label">Detail level</div>
    <div class="pdf-options">
      <label class="pdf-opt">
        <input type="radio" name="pdfDetail" value="summary" checked>
        <div class="pdf-opt-body">
          <strong>Summary — discipline overview</strong>
          <span>One page per property. Shows all disciplines, status, and open comment counts. Best for quick sharing.</span>
        </div>
      </label>
      <label class="pdf-opt">
        <input type="radio" name="pdfDetail" value="full">
        <div class="pdf-opt-body">
          <strong>Full — includes all comments + internal tracking</strong>
          <span>Every iBuild comment with assigned person, our status, and history log. Best for team reviews.</span>
        </div>
      </label>
    </div>

    <div class="pdf-actions">
      <button class="pdf-cancel" onclick="document.getElementById('pdfModal').classList.remove('open')">Cancel</button>
      <button class="pdf-go" onclick="generatePDF()">Generate PDF</button>
    </div>
  </div>
</div>

<!-- Print document (hidden until print) -->
<div id="printDoc"></div>

<script>
// ── PDF GENERATION ────────────────────────────────────────────────────────
const PD_BADGE = {
  'CORRECTIONS':'pd-b-r','PENDING ACTION':'pd-b-a','PENDING REVIEW':'pd-b-a',
  'APPROVED':'pd-b-g','PRE-SUBMISSION':'pd-b-gray'
};
const PD_INT_BADGE = {
  'Pending':'pd-b-gray','In Progress':'pd-b-blue','With Architect':'pd-b-a',
  'With Engineer':'pd-b-a','With Owner':'pd-b-a','Submitted':'pd-b-purple','Resolved':'pd-b-g'
};
const PD_CITY_BADGE = {
  'Unresolved':'pd-b-r','Resolved':'pd-b-g','Info Only':'pd-b-gray','Information':'pd-b-gray'
};

async function generatePDF() {
  document.getElementById('pdfModal').classList.remove('open');

  const detail = document.querySelector('input[name="pdfDetail"]:checked').value;
  const propKeys = ['156','150','160','167'].filter(k =>
    document.getElementById('pdfProp' + k)?.checked
  );

  const doc = document.getElementById('printDoc');
  const now = new Date();
  const nowStr = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) +
    ' · ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  // Total open across selected props
  const totalOpen = propKeys.reduce((s,k) => {
    const p = PROPS.find(x=>x.key===k); return s + (p?.open||0);
  }, 0);

  let html = `
    <div class="pd-cover">
      <div class="pd-cover-brand">Portland Saxum</div>
      <div class="pd-cover-sub">Permit Status Report — ${detail === 'full' ? 'Full Detail' : 'Summary'}</div>
      <div class="pd-cover-meta">Generated: ${nowStr} &nbsp;·&nbsp; Properties: ${propKeys.length} &nbsp;·&nbsp; Total open comments: ${totalOpen}</div>
    </div>`;

  // One section per property
  for (const propKey of propKeys) {
    const prop = PROPS.find(p => p.key === propKey);
    const discs = DISCIPLINES[propKey] || [];
    const isPreSub = false;
    const pctColor = prop.pct === 0 ? 'r' : prop.pct < 50 ? 'a' : 'g';
    const pctBarColor = prop.pct === 0 ? '#A32D2D' : prop.pct < 50 ? '#854F0B' : '#3B6D11';

    html += `<div class="pd-prop-section">
      <div class="pd-prop-header">
        <div class="pd-prop-title">${prop.addr} &nbsp;<span style="font-size:10px;opacity:.7">${prop.permit}</span></div>
        <div class="pd-prop-meta">${prop.cycle} · Workflow: ${prop.workflow} · ${prop.note}</div>
      </div>`;

    if (!isPreSub) {
      html += `<div class="pd-prop-stats">
        <div class="pd-stat"><div class="pd-stat-v">${prop.total}</div><div class="pd-stat-l">Total</div></div>
        <div class="pd-stat"><div class="pd-stat-v r">${prop.open}</div><div class="pd-stat-l">Open</div></div>
        <div class="pd-stat"><div class="pd-stat-v a">${prop.info}</div><div class="pd-stat-l">Info only</div></div>
        <div class="pd-stat"><div class="pd-stat-v g">${prop.resolved}</div><div class="pd-stat-l">Resolved</div></div>
        <div class="pd-stat">
          <div class="pd-stat-v ${pctColor}">${prop.pct}%</div>
          <div class="pd-stat-l">Done</div>
          <div class="pd-bar-wrap"><div class="pd-bar-fill" style="width:${prop.pct}%;background:${pctBarColor}"></div></div>
        </div>
      </div>`;

      // Discipline summary table
      html += `<table class="pd-disc">
        <thead><tr>
          <th>Discipline</th><th>Reviewer</th><th>City Status</th>
          <th class="c">Total</th><th class="c">Open</th><th class="c">Info</th>
          <th>Our Status</th>
        </tr></thead><tbody>`;

      for (const d of discs) {
        const cityClass = PD_BADGE[d.cityStatus] || 'pd-b-gray';
        let ourLabel='—', ourClass='pd-b-gray';
        if (d.comments.length > 0) {
          let counts={};
          for (const c of d.comments) {
            const data = await getCommentData(propKey, d.code, c.ref);
            counts[data.status] = (counts[data.status]||0)+1;
          }
          const res=counts['Resolved']||0, sub=counts['Submitted']||0;
          const inp=counts['In Progress']||0;
          const withT=(counts['With Architect']||0)+(counts['With Engineer']||0)+(counts['With Owner']||0);
          if(res===d.comments.length){ourLabel='All resolved';ourClass='pd-b-g';}
          else if(sub>0){ourLabel=`${sub} submitted`;ourClass='pd-b-purple';}
          else if(withT>0){ourLabel=`${withT} assigned`;ourClass='pd-b-a';}
          else if(inp>0){ourLabel=`${inp} in progress`;ourClass='pd-b-blue';}
          else{ourLabel='Not started';ourClass='pd-b-gray';}
        }
        html += `<tr>
          <td><strong>(${d.code}) ${d.name}</strong></td>
          <td style="color:#666;font-size:10px">${d.reviewer}</td>
          <td><span class="pd-badge ${cityClass}">${d.cityStatus}</span></td>
          <td class="c">${d.total||'—'}</td>
          <td class="${d.cityStatus==='APPROVED'?'ok':'hot'}">${d.cityStatus==='APPROVED'?'✓':(d.open||'—')}</td>
          <td class="c">${d.info||'—'}</td>
          <td><span class="pd-badge ${ourClass}">${ourLabel}</span></td>
        </tr>`;
      }
      html += `</tbody></table>`;

      // Alerts
      if (prop.alerts.length > 0) {
        html += `<div class="pd-alerts-title">Key actions required</div>`;
        prop.alerts.forEach(a => {
          html += `<div class="pd-alert ${a.level}">
            <span class="pd-alert-pill ${a.level}">${a.level==='r'?'URGENT':'NOTE'}</span>
            <div><strong>${a.title}</strong> — ${a.text}</div>
          </div>`;
        });
      }

      // Full detail: comment-by-comment breakdown
      if (detail === 'full') {
        html += `<div class="pd-comments-section pd-page-break">
          <div style="font-size:11px;font-weight:600;color:#1B3A6B;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.04em">
            ${prop.addr} — Comment Detail
          </div>`;

        for (const d of discs) {
          if (d.comments.length === 0) continue;
          html += `<div class="pd-disc-group">
            <div class="pd-disc-group-title">(${d.code}) ${d.name} — ${d.reviewer}</div>
            <div class="pd-comment-head">
              <span>Ref</span><span>iBuild Comment</span>
              <span>City</span><span>Assigned to</span><span>Our status · Notes</span>
            </div>`;

          for (const c of d.comments) {
            const data = await getCommentData(propKey, d.code, c.ref);
            const cityClass = PD_CITY_BADGE[c.cs]||'pd-b-gray';
            const intClass  = PD_INT_BADGE[data.status]||'pd-b-gray';
            const lastHist  = data.history?.length > 0 ? data.history[data.history.length-1] : null;
            html += `<div class="pd-comment-row">
              <div><span class="pd-comment-ref">REF #${c.ref}</span></div>
              <div class="pd-comment-text">${c.text}</div>
              <div><span class="pd-badge ${cityClass}">${c.cs}</span></div>
              <div style="font-size:10px;color:#444">${data.assignee||'—'}</div>
              <div>
                <span class="pd-badge ${intClass}">${data.status}</span>
                ${data.notes ? `<div style="font-size:9.5px;color:#666;margin-top:2px">${data.notes}</div>`:''}
                ${lastHist ? `<div class="pd-hist-ts" style="margin-top:3px">${fmtDate(lastHist.ts)}</div>`:''}
              </div>
            </div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }

    } else {
      // 167 pre-submission
      html += `<div style="padding:16px;background:#F9F9F7;border:0.5px solid #E0E0D8;border-top:none;
        font-size:11px;color:#888;font-style:italic">
        Not yet submitted to the City of Miami. No permit number or iBuild review comments.
      </div>`;
    }

    html += `</div>`; // pd-prop-section
  }

  html += `<div class="pd-footer">
    <span>Portland Saxum Construction Management · Permit Tracker</span>
    <span>${nowStr}</span>
  </div>`;

  doc.innerHTML = html;

  // Small delay so DOM renders, then print
  setTimeout(() => {
    window.print();
  }, 300);
}
</script>
